<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESPENSA MARGARITA</title>

<link rel="stylesheet" href="styles.css">

<!-- Fuente PRO -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- HEADER -->
   <header class="header">
  <img src="https://despensa-margarita.vercel.app/photo_4958725565448302119_y.jpg">
  <h1>DESPENSA MARGARITA</h1>
</header>

    <!-- APERTURA -->
    <section class="card">
        <h2>Apertura de Caja</h2>
        <div class="row">
            <input type="number" id="opening-cash" placeholder="Monto inicial">
            <button onclick="setOpeningCash()">Iniciar Caja</button>
        </div>
    </section>

    <!-- FORM PRODUCTO -->
    <section id="product-form" class="card">
        <h2>Agregar Producto</h2>

        <input type="text" id="product-code" placeholder="Código de Barras">
        <input type="text" id="product-name" placeholder="Nombre del Producto">
        <input type="number" step="0.01" id="product-price" placeholder="Precio">
        <input type="number" step="0.01" id="product-cost" placeholder="Costo">

        <select id="product-unit">
            <option value="unidad">Unidad</option>
            <option value="kg">Kilogramo</option>
            <option value="litro">Litro</option>
        </select>

        <input type="number" step="0.001" id="product-quantity" placeholder="Cantidad" min="0">
        <button onclick="addProduct()">Agregar</button>
    </section>

    <!-- BUSCADOR -->
    <section id="product-search" class="card">
        <input type="text" id="search-code" placeholder="Buscar producto...">
    </section>

    <div id="product-result"></div>

    <!-- CAJA -->
    <section id="checkout" class="card checkout">
        <h2>Caja</h2>

        <div class="scan-area">
            <input type="text" id="scan-code" placeholder="Escanear código...">
            <button onclick="scanProduct()">Añadir</button>
        </div>

        <ul id="cart"></ul>

        <!-- TOTAL PRO -->
        <div class="total-box">
            <span>Total</span>
            <h3>$<span id="total-price">0.00</span></h3>
        </div>

        <!-- PAGOS -->
        <div class="payments">
            <button onclick="finalizeSale('efectivo')" class="btn-success">Efectivo</button>
            <button onclick="finalizeSale('transferencia')" class="btn-primary">Transferencia</button>
        </div>
    </section>

    <!-- ACCIONES -->
    <section class="card center">
        <button onclick="consultarTotalVendido()">Consultar Total</button>
        <button onclick="limpiarTotalVendido()">Limpiar Total</button>
    </section>

    <!-- PRODUCTOS -->
  <section id="product-list" class="card">
  <h2>Inventario</h2>

  <ul id="products"></ul>

  <!-- 🔥 AHORA NO QUEDA ABAJO -->
  <div class="file-actions">
    <input type="file" id="fileInput" accept=".txt">
    <button onclick="displayProducts()">Refrescar</button>
    <button onclick="downloadProducts()">Descargar</button>
  </div>
</section>
 
</div>

<!-- LOADING -->
<div id="loading-screen">
    <div class="spinner"></div>
</div>

<!-- MODAL VUELTO -->
<div id="cash-change-modal" class="cash-modal-backdrop">
  <div class="cash-modal">

    <button class="cash-modal-close">&times;</button>

    <div class="cash-header">
      <h2>💰 Vuelto</h2>
    </div>

    <!-- MONTO PRINCIPAL -->
    <div class="cash-main-amount">
      $<span id="ccm-vuelto">0.00</span>
    </div>

    <!-- INFO SECUNDARIA -->
    <div class="cash-details">

      <div class="cash-row">
        <span>Total</span>
        <span id="ccm-total">$0.00</span>
      </div>

      <div class="cash-row">
        <span>Pagó con</span>
        <span id="ccm-pagocon">$0.00</span>
      </div>

    </div>

    <!-- BOTONES -->
    <div class="cash-actions">
      <button id="ccm-print" class="btn-secondary">🖨 Imprimir</button>
      <button id="ccm-ok" class="btn-primary">✔ Listo</button>
    </div>

  </div>
</div>
<div id="ventas-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999;">
  
  <div style="background:#fff; width:90%; max-width:600px; margin:50px auto; padding:20px; border-radius:10px; position:relative;">
    
    <button class="close" style="position:absolute; top:10px; right:10px; font-size:20px;">×</button>
    
    <h2>Resumen de Ventas</h2>
    
    <textarea id="sales-summary" style="width:100%; height:300px;"></textarea>
    <button onclick="downloadTotalVendidoTxt()">
  📥 Descargar Total Vendido
</button>
  </div>

</div>
<script src="scripts.js"></script>
<script src="emisor-cliente.js"></script>

</body>
</html>
